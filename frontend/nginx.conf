server {
    listen 80;
    server_name localhost;

    # 前端静态文件的根目录，指向从构建阶段复制过来的编译产物
    root /usr/share/nginx/html;
    index index.html;

    # 【Vue Router History 模式配置】
    # Vue Router 的 History 模式下，URL 中没有 # 号，看起来像真实的路径。
    # 但这些路径在服务器上并不存在对应的文件，直接访问会返回 404。
    # try_files 的作用：
    #   1. 先尝试将请求路径当作文件查找（$uri）
    #   2. 再尝试当作目录查找（$uri/）
    #   3. 如果都不是，返回 /index.html，由前端路由接管 URL 解析
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 【反向代理配置】
    # 将 /api 开头的请求代理到后端服务
    # proxy_pass 的工作原理：
    #   - 客户端请求 /api/users -> Nginx 收到后转发给 http://backend:8000/api/users
    #   - Nginx 作为中间层，客户端不需要知道后端的实际地址
    # 【Docker 容器间的服务名通信】
    #   - 在 Docker Compose 中，每个服务的名称会被自动注册为 DNS 主机名
    #   - "backend" 是 docker-compose.yml 中后端服务的名称
    #   - 同一 Docker 网络内的容器可以通过服务名直接访问彼此
    location /api {
        proxy_pass http://backend:8000;
        # 将客户端的真实 Host 和 IP 传递给后端，便于后端获取客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
