# =============================================================================
# CD 流水线：CI 通过后自动部署到 CentOS 服务器
# 流程：构建镜像 → 打包 → 传输 → 加载 → 部署 → 健康检查
# =============================================================================

name: CD

on:
  push:
    branches: [main]
  # 支持手动触发（GitHub Actions 页面点击 Run workflow）
  workflow_dispatch:

# 确保 CI 通过后再部署
jobs:
  deploy:
    runs-on: ubuntu-latest
    # 只有 push 到 main 才自动部署，手动触发不受限
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      # ---- 构建 Docker 镜像 ----
      - name: Build backend image
        run: docker build -t intraai-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t intraai-frontend:latest ./frontend

      # ---- 打包镜像为 tar 文件 ----
      # 服务器可能无法直接访问 GitHub Container Registry，所以用文件传输
      - name: Save images to tar
        run: |
          docker save intraai-backend:latest -o /tmp/intraai-backend.tar
          docker save intraai-frontend:latest -o /tmp/intraai-frontend.tar

      # ---- 传输到服务器 ----
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: |
            /tmp/intraai-backend.tar,
            /tmp/intraai-frontend.tar,
            docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      # ---- 在服务器上部署 ----
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            # 加载镜像
            docker load -i intraai-backend.tar
            docker load -i intraai-frontend.tar

            # 重启服务
            docker compose down
            docker compose up -d

            # 等待服务启动
            sleep 10

            # 清理临时文件
            rm -f intraai-backend.tar intraai-frontend.tar

      # ---- 健康检查 ----
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            # 检查容器是否运行
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose ps

            # 检查后端健康接口
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Backend health check failed: HTTP $HTTP_CODE"
              docker compose logs backend --tail=50
              exit 1
            fi

            # 检查前端是否可访问
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80)
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Frontend health check failed: HTTP $HTTP_CODE"
              docker compose logs frontend --tail=50
              exit 1
            fi

            echo "Deployment verified successfully!"
